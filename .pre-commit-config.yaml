repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: scythe-fmt
        name: scythe fmt
        entry: scythe fmt
        language: system
        types: [sql]
      - id: scythe-lint
        name: scythe lint
        entry: scythe lint --fix
        language: system
        types: [sql]
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [.]
