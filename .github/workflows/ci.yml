name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: vibecheck
          POSTGRES_PASSWORD: vibecheck
          POSTGRES_DB: vibecheck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vibecheck -d vibecheck"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      rabbitmq:
        image: rabbitmq:management
        env:
          RABBITMQ_DEFAULT_USER: vibecheck
          RABBITMQ_DEFAULT_PASS: vibecheck
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: vibecheck
      POSTGRES_PASSWORD: vibecheck
      POSTGRES_DB: vibecheck
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: vibecheck
      RABBITMQ_PASS: vibecheck
      SCYTHE_VERSION: v0.8.0
      DATABASE_URL: postgres://vibecheck:vibecheck@localhost:5432/vibecheck?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --all-packages --all-groups

      - name: Install scythe
        run: |
          set -euo pipefail
          url="https://github.com/Goldziher/scythe/releases/download/${SCYTHE_VERSION}/scythe-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" -o /tmp/scythe.tar.gz
          tar -xzf /tmp/scythe.tar.gz -C /tmp
          sudo install -m 0755 /tmp/scythe /usr/local/bin/scythe
          scythe --version

      - name: Install pgschema
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/pgschema \
            https://github.com/pgplex/pgschema/releases/download/v1.10.0/pgschema-1.10.0-linux-amd64
          sudo chmod +x /usr/local/bin/pgschema
          pgschema --help >/dev/null && echo "pgschema installed"

      - name: Install squawk
        run: npm install -g squawk-cli && squawk --version

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Scythe lint
        run: scythe lint sql/queries/*.sql

      - name: Scythe fmt check
        run: scythe fmt --check sql/queries/*.sql

      - name: Apply schema (pgschema)
        run: DATABASE_URL="$DATABASE_URL" ./scripts/db-apply.sh --auto-approve

      # Lints the migration the schema change would produce. After "Apply schema"
      # the DB already matches sql/schema.sql, so the plan is empty here and squawk
      # is skipped — the gate has real content only when planning against a DB that
      # holds the prior schema (e.g. locally before applying, or a staging baseline).
      - name: Squawk (plan safety)
        run: |
          set -euo pipefail
          eval "$(./scripts/pg-env.sh)"
          pgschema plan --schema public --file sql/schema.sql --output-sql /tmp/plan.sql
          if [ -s /tmp/plan.sql ]; then
            squawk /tmp/plan.sql
          else
            echo "Empty plan (DB already matches schema) — nothing to lint."
          fi

      - name: Codegen freshness
        run: |
          ./scripts/codegen.sh
          git diff --exit-code lib/db/lib_db/generated/

      - name: Mypy
        run: uv run mypy .

      - name: Seed tools
        run: psql "$DATABASE_URL" -f sql/seeds/tools.sql

      - name: Pytest
        run: uv run pytest
