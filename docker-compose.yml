services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibecheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibecheck}
      POSTGRES_DB: ${POSTGRES_DB:-vibecheck}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibecheck} -d ${POSTGRES_DB:-vibecheck}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-vibecheck}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-vibecheck}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:latest
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      # Inside the compose network the DB host is the service name "postgres".
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-vibecheck}:${POSTGRES_PASSWORD:-vibecheck}@postgres:5432/${POSTGRES_DB:-vibecheck}?sslmode=disable}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
